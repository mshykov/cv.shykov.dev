<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CV Toolkit — analyze, match &amp; build ATS-clean CVs in your browser</title>
    <meta
      name="description"
      content="Score your CV's ATS-readiness, match it to a job description, and build an ATS-clean CV — 100% in your browser. Nothing is ever uploaded."
    />

    <!-- Modern browsers: SVG -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Legacy fallback -->
    <link rel="alternate icon" href="/favicon.ico" />
    <!-- iOS Safari: tab thumbnails + Add to Home Screen -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="apple-mobile-web-app-title" content="CV Toolkit" />
    <!-- Mobile address-bar tint -->
    <meta name="theme-color" content="#4f46e5" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CV Toolkit" />
    <meta
      property="og:description"
      content="Analyze, job-match, and build ATS-clean CVs in your browser. No uploads, no tracking."
    />
    <meta property="og:url" content="https://cv.shykov.dev/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
